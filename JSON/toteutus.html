<div id="toteutus"></div>

<script>

fetch("toteutus.json")

.then(function(response){
return response.json();
})

.then(function(data){

let teksti="";

teksti+="<h1>"+data.nimi+"</h1>";

teksti+=data.osallistujat+" kpl<br><br>";

teksti+=data.henkilot.join(" ")+"<br><br>";

teksti+=data.alku+" - "+data.loppu+"<br><br>";

teksti+=data.kesto+"<br><br>";

teksti+="<img src='"+data.kuva+"' width='600'>";

document.getElementById("toteutus").innerHTML=teksti;

})

</script>
