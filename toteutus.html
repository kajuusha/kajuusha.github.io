<!DOCTYPE html>
<html lang="fi">

<head>
<meta charset="UTF-8">
<title>JSON tietue</title>
</head>

<body>

<h1>JSON tietue</h1>

<div id="vastaus"></div>

<script>

fetch("tietue.json")

.then(function(response){
return response.json();
})

.then(function(data){
kerro(data);
})

.catch(function(error){
document.getElementById("vastaus").innerHTML="Tietoa ei pystytä hakemaan";
});

function kerro(obj){

let tiedot="";

tiedot += "<h2>"+obj.otsikko+"</h2>";
tiedot += "<p>"+obj.kuvaus+"</p>";

tiedot += "<img src='"+obj.kuva+"' width='200'><br><br>";

tiedot += "<h3>Opintojakso</h3>";

tiedot += "Nimi: "+obj.opintojakso.nimi+"<br>";
tiedot += "Tunnus: "+obj.opintojakso.tunnus+"<br>";
tiedot += "Opintopisteet: "+obj.opintojakso.opintopisteet+"<br>";

tiedot += "<h3>Aiheet</h3>";

for(let i=0;i<obj.tekniikat.length;i++){

tiedot += "<b>"+obj.tekniikat[i].aihe+"</b> ";
tiedot += "<a href='"+obj.tekniikat[i].linkki+"'>linkki</a><br>";

}

document.getElementById("vastaus").innerHTML = tiedot;

}

</script>

</body>
</html>
